<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Generator</title>
    <style>
        :root { --bg:#0d0d0d; --surface:#1a1a1a; --border:#2a2a2a; --accent:#fe2c55; --cyan:#25f4ee; --text:#e0e0e0; --muted:#888; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Malgun Gothic',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

        .header { background:linear-gradient(135deg,#fe2c55,#25f4ee); padding:14px 32px; display:flex; align-items:center; justify-content:space-between; }
        .header h1 { font-size:20px; color:white; }
        .header .status { font-size:12px; color:rgba(255,255,255,0.8); }

        .container { max-width:1500px; margin:0 auto; padding:20px; display:grid; grid-template-columns:300px 1fr 300px; gap:20px; min-height:calc(100vh - 54px); }
        .panel { background:var(--surface); border-radius:12px; padding:18px; border:1px solid var(--border); }
        .panel h2 { font-size:14px; color:var(--accent); margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid var(--border); }

        .input-group { margin-bottom:14px; }
        .input-group label { display:block; font-size:11px; color:var(--muted); margin-bottom:5px; }
        .input-group input,.input-group textarea { width:100%; background:#252525; border:1px solid #333; border-radius:7px; padding:9px 12px; color:var(--text); font-size:13px; font-family:inherit; }
        .input-group input:focus,.input-group textarea:focus { outline:none; border-color:var(--accent); }
        .input-group textarea { resize:vertical; min-height:70px; }

        .btn { width:100%; padding:11px; border:none; border-radius:8px; font-size:13px; font-weight:bold; cursor:pointer; font-family:inherit; transition:all 0.2s; }
        .btn-primary { background:linear-gradient(135deg,#fe2c55,#ff6b81); color:white; }
        .btn-primary:hover { transform:translateY(-1px); }
        .btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
        .btn-generate { background:linear-gradient(135deg,#25f4ee,#00c9b7); color:#0f0f0f; margin-top:10px; }

        .scenes-panel { overflow-y:auto; max-height:calc(100vh - 100px); }
        .scene-card { background:#222; border-radius:10px; padding:12px; margin-bottom:10px; border:2px solid #333; cursor:pointer; transition:border-color .15s; }
        .scene-card:hover { border-color:#555; }
        .scene-card.active { border-color:var(--accent); }
        .scene-header { display:flex; align-items:center; gap:6px; margin-bottom:8px; }
        .scene-badge { font-size:10px; padding:2px 8px; border-radius:10px; font-weight:bold; }
        .badge-thumbnail { background:#ff9800; color:#000; }
        .badge-image-text { background:#2196f3; color:white; }
        .badge-text { background:#555; color:white; }
        .scene-name { font-size:11px; color:var(--muted); flex:1; }
        .scene-info { font-size:10px; color:#666; }

        .line-item { background:#1a1a1a; border:1px solid #333; border-radius:8px; padding:8px; margin-bottom:6px; transition:border-color .15s; }
        .line-item:hover { border-color:#555; }
        .line-item.selected { border-color:var(--cyan); }
        .line-top { display:flex; align-items:center; gap:4px; }
        .line-num { font-size:10px; color:#555; width:16px; text-align:right; flex-shrink:0; }
        .line-input { flex:1; background:#252525; border:1px solid #333; border-radius:5px; padding:6px 8px; color:var(--text); font-size:12px; font-family:inherit; }
        .line-input:focus { outline:none; border-color:var(--accent); }
        .line-actions { display:flex; gap:2px; }
        .line-btn { background:none; border:1px solid #444; color:#888; cursor:pointer; border-radius:4px; width:22px; height:22px; font-size:10px; display:flex; align-items:center; justify-content:center; }
        .line-btn:hover { border-color:var(--accent); color:var(--accent); }
        .line-btn.active { background:var(--accent); border-color:var(--accent); color:white; }

        .style-panel { display:none; background:#151515; border-radius:6px; padding:8px; margin-top:4px; }
        .style-panel.show { display:block; }
        .style-row { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
        .style-label { font-size:10px; color:#666; width:36px; flex-shrink:0; }
        .style-select { background:#252525; border:1px solid #333; border-radius:4px; padding:3px 6px; color:var(--text); font-size:11px; flex:1; font-family:inherit; }
        .style-range { flex:1; accent-color:var(--accent); height:16px; }
        .style-val { font-size:10px; color:var(--muted); min-width:22px; text-align:right; }

        .color-row { display:flex; gap:4px; align-items:center; flex:1; }
        .color-dot { width:18px; height:18px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:border-color 0.15s; }
        .color-dot:hover { border-color:#888; }
        .color-dot.sel { border-color:white; }
        .color-picker { width:18px; height:18px; border-radius:50%; border:2px solid #444; cursor:pointer; padding:0; }

        .line-image-slot { margin-top:4px; border:1px dashed #444; border-radius:6px; padding:6px; text-align:center; cursor:pointer; font-size:10px; color:#555; position:relative; }
        .line-image-slot:hover { border-color:var(--accent); }
        .line-image-slot.has-img { border-style:solid; border-color:var(--cyan); padding:4px; }
        .line-image-slot img { max-width:100%; max-height:60px; border-radius:4px; }
        .line-image-slot .rm { position:absolute; top:2px; right:2px; background:var(--accent); color:white; border:none; border-radius:50%; width:16px; height:16px; cursor:pointer; font-size:10px; }

        .img-editor { background:#151515; border-radius:6px; padding:8px; margin-top:4px; }
        .img-editor .style-row { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
        .img-editor .style-label { font-size:10px; color:#666; width:36px; flex-shrink:0; }
        .img-editor .style-range { flex:1; accent-color:var(--cyan); height:16px; }
        .img-editor .style-val { font-size:10px; color:var(--muted); min-width:30px; text-align:right; }

        .add-line-btn { background:#252525; border:1px dashed #444; border-radius:6px; padding:5px; color:#666; cursor:pointer; font-size:11px; text-align:center; margin-top:4px; font-family:inherit; }
        .add-line-btn:hover { border-color:var(--accent); color:var(--accent); }

        .thumb-input { width:100%; background:#1a1a1a; border:1px solid #333; border-radius:5px; padding:7px 9px; color:var(--text); font-size:12px; font-family:inherit; }
        .thumb-input:focus { outline:none; border-color:#ff9800; }

        /* 미리보기 패널 */
        .preview-panel { position:sticky; top:20px; }
        .phone-frame { background:#000; border-radius:18px; padding:5px; aspect-ratio:9/16; overflow:hidden; margin-bottom:10px; }
        .phone-screen { background:#f0f0f0; border-radius:14px; width:100%; height:100%; position:relative; overflow:hidden; }
        .phone-screen canvas { width:100%; height:100%; border-radius:14px; }
        .phone-screen video { width:100%; height:100%; object-fit:contain; border-radius:14px; }
        .phone-screen .placeholder { color:#999; font-size:11px; text-align:center; padding:14px; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }

        .preview-nav { display:flex; gap:6px; margin-bottom:8px; }
        .preview-nav button { flex:1; padding:6px; background:#222; border:1px solid #333; color:var(--muted); border-radius:6px; cursor:pointer; font-size:11px; font-family:inherit; }
        .preview-nav button:hover { border-color:var(--accent); color:var(--text); }
        .preview-nav button.active { background:var(--accent); border-color:var(--accent); color:white; }
        .preview-scene-label { font-size:11px; color:var(--muted); text-align:center; margin-bottom:6px; }

        .total-info { background:#222; border-radius:7px; padding:8px; font-size:11px; color:var(--muted); margin-bottom:10px; }
        .total-info span { color:var(--cyan); font-weight:bold; }

        .result-actions { display:flex; gap:6px; margin-top:8px; }
        .result-actions a,.result-actions button { flex:1; padding:9px; border-radius:7px; text-align:center; text-decoration:none; font-size:12px; font-weight:bold; font-family:inherit; cursor:pointer; border:none; }
        .btn-download { background:var(--cyan); color:#0f0f0f; }
        .btn-reset { background:#333; color:var(--text); }

        .loading { display:none; text-align:center; padding:24px; }
        .loading.show { display:block; }
        .spinner { width:32px; height:32px; border:3px solid #333; border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 8px; }
        @keyframes spin { to { transform:rotate(360deg); } }

        .toast { position:fixed; bottom:20px; right:20px; background:#333; color:var(--text); padding:9px 16px; border-radius:7px; font-size:12px; transform:translateY(70px); opacity:0; transition:all .3s; z-index:1000; }
        .toast.show { transform:translateY(0); opacity:1; }
        .toast.error { background:var(--accent); color:white; }

        .mode-tabs { display:flex; gap:0; margin-bottom:14px; border-radius:8px; overflow:hidden; border:1px solid var(--border); }
        .mode-tab { flex:1; padding:9px; text-align:center; font-size:12px; font-weight:bold; cursor:pointer; background:#222; color:var(--muted); border:none; font-family:inherit; transition:all .2s; }
        .mode-tab.active { background:var(--accent); color:white; }
        .mode-tab:first-child { border-right:1px solid var(--border); }
        .mode-content { display:none; }
        .mode-content.active { display:block; }

        .add-scene-grid { display:flex; flex-direction:column; gap:8px; }
        .add-scene-btn { padding:14px 12px; border:2px dashed #444; border-radius:10px; background:#1a1a1a; color:var(--text); cursor:pointer; font-family:inherit; font-size:12px; text-align:left; transition:all .2s; display:flex; align-items:center; gap:10px; }
        .add-scene-btn:hover { border-color:var(--accent); background:#222; }
        .add-scene-btn .icon { font-size:20px; width:36px; height:36px; display:flex; align-items:center; justify-content:center; background:#252525; border-radius:8px; flex-shrink:0; }
        .add-scene-btn .label { font-weight:bold; }
        .add-scene-btn .desc { font-size:10px; color:var(--muted); margin-top:2px; }

        .scene-actions { display:flex; gap:4px; margin-left:auto; }
        .scene-action-btn { background:none; border:1px solid #444; color:#888; cursor:pointer; border-radius:4px; width:22px; height:22px; font-size:10px; display:flex; align-items:center; justify-content:center; }
        .scene-action-btn:hover { border-color:var(--accent); color:var(--accent); }

        @media(max-width:1200px) { .container { grid-template-columns:1fr; } .preview-panel { position:static; } .phone-frame { max-height:400px; margin:0 auto; max-width:230px; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>TikTok Video Generator</h1>
        <div class="status" id="status">준비됨</div>
    </div>

    <div class="container">
        <div class="panel">
            <div class="mode-tabs">
                <button class="mode-tab active" onclick="switchMode('auto')">자동 생성</button>
                <button class="mode-tab" onclick="switchMode('self')">셀프 생성</button>
            </div>

            <div class="mode-content active" id="modeAuto">
                <h2>1. 주제 입력</h2>
                <div class="input-group">
                    <label>주제 / 제품명</label>
                    <input type="text" id="topic" placeholder="예: 비타민C 세럼...">
                </div>
                <div class="input-group">
                    <label>상세 설명</label>
                    <textarea id="description" placeholder="제품 특징, 효과, 타겟..."></textarea>
                </div>
                <div class="input-group">
                    <label>대본 방향 (선택)</label>
                    <textarea id="direction" placeholder="예: 겨드랑이 까만사람들 이거 꼭 봐, 착색크림으로 해결하는 스토리&#10;비워두면 AI가 랜덤 생성" style="min-height:50px"></textarea>
                </div>
                <button class="btn btn-primary" id="btnGenScript" onclick="generateScript()">대본 생성</button>
                <div class="loading" id="scriptLoading"><div class="spinner"></div><div style="font-size:12px;color:var(--muted)">대본 생성 중...</div></div>
            </div>

            <div class="mode-content" id="modeSelf">
                <h2>1. 장면 추가</h2>
                <div class="add-scene-grid">
                    <button class="add-scene-btn" onclick="addSceneSelf('thumbnail')">
                        <div class="icon">🖼</div>
                        <div><div class="label">+ 썸네일</div><div class="desc">제목 + 이미지 (첫 장면)</div></div>
                    </button>
                    <button class="add-scene-btn" onclick="addSceneSelf('image_text')">
                        <div class="icon">📷</div>
                        <div><div class="label">+ 이미지+텍스트 장면</div><div class="desc">배경 이미지 위에 텍스트 누적</div></div>
                    </button>
                    <button class="add-scene-btn" onclick="addSceneSelf('text')">
                        <div class="icon">📝</div>
                        <div><div class="label">+ 텍스트 장면</div><div class="desc">텍스트만 누적 표시</div></div>
                    </button>
                </div>
                <div style="margin-top:14px;padding:10px;background:#222;border-radius:8px;font-size:11px;color:var(--muted);line-height:1.6">
                    장면을 추가하고 오른쪽 편집 패널에서<br>
                    <span style="color:var(--cyan)">줄 추가</span> / <span style="color:var(--cyan)">이미지 추가</span> / <span style="color:var(--cyan)">스타일 편집</span><br>
                    자유롭게 구성하세요
                </div>
            </div>
        </div>

        <div class="panel scenes-panel">
            <h2>2. 장면 편집 <span style="font-size:10px;color:var(--muted);font-weight:normal">(장면 클릭 = 미리보기)</span></h2>
            <div id="scenesContainer"><div style="text-align:center;color:#555;padding:40px 16px;font-size:12px;">주제를 입력하고 대본을 생성해주세요</div></div>
            <button class="btn btn-generate" id="btnGenVideo" style="display:none" onclick="generateVideo()">영상 생성</button>
            <div class="loading" id="videoLoading"><div class="spinner"></div><div style="font-size:12px;color:var(--muted)">영상 생성 중...</div></div>
        </div>

        <div class="panel preview-panel">
            <h2>3. 미리보기</h2>
            <div class="total-info" id="totalInfo">총 <span id="totalLines">0</span>줄 / 예상 <span id="totalDuration">0</span>초</div>
            <div class="preview-scene-label" id="previewLabel">장면을 선택하세요</div>
            <div class="phone-frame"><div class="phone-screen" id="previewScreen"><canvas id="previewCanvas" width="720" height="1280"></canvas><div class="placeholder" id="previewPlaceholder">대본 생성 후<br>미리보기 표시</div></div></div>
            <div class="preview-nav" id="previewNav" style="display:none">
                <button onclick="previewPrevLine()">◀ 이전 줄</button>
                <button onclick="previewNextLine()">다음 줄 ▶</button>
            </div>
            <div id="resultArea" style="display:none"><div class="result-actions"><a class="btn-download" id="downloadLink" href="#" download>다운로드</a><button class="btn-reset" onclick="resetAll()">새로 만들기</button></div></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let sessionId = Math.random().toString(36).substr(2,8);
        let currentScenes = [];
        let availableFonts = {};
        let activeSceneIdx = -1;
        let previewLineIdx = -1;
        let loadedImages = {};
        const defaultColors = ['#1A1A1A','#000000','#FFFFFF','#fe2c55','#2196f3','#ff9800','#4CAF50'];
        const CANVAS_W = 720, CANVAS_H = 1280;

        fetch('/api/fonts').then(r=>r.json()).then(d=>{ availableFonts=d; });

        function showToast(m,e=false){ const t=document.getElementById('toast'); t.textContent=m; t.className='toast show'+(e?' error':''); setTimeout(()=>t.className='toast',3000); }
        function esc(s){ return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        function updateTotals(){
            let tl=0, td=0;
            currentScenes.forEach(s=>{
                if(s.type==='thumbnail'){ td+=s.duration||2.5; }
                else{ const ld=s.lines_data||[]; tl+=ld.length; td+=ld.length*1.1+0.5; }
            });
            document.getElementById('totalLines').textContent=tl;
            document.getElementById('totalDuration').textContent=td.toFixed(1);
        }

        function ensureLinesData(scene){
            if(!scene.lines_data){
                scene.lines_data = (scene.lines||[]).map(l=>({text:l,style:{}}));
                delete scene.lines;
            }
            return scene.lines_data;
        }

        // ===== 미리보기 렌더링 =====
        function renderPreview(){
            const canvas = document.getElementById('previewCanvas');
            const ctx = canvas.getContext('2d');
            const ph = document.getElementById('previewPlaceholder');

            // 영상 재생 중이면 미리보기 스킵
            const existingVideo = document.getElementById('previewScreen').querySelector('video');
            if(existingVideo) return;

            if(activeSceneIdx < 0 || activeSceneIdx >= currentScenes.length){
                ph.style.display = 'block';
                canvas.style.display = 'none';
                return;
            }
            ph.style.display = 'none';
            canvas.style.display = 'block';
            canvas.style.position = 'relative';
            canvas.style.zIndex = '1';

            const scene = currentScenes[activeSceneIdx];
            ctx.fillStyle = '#F0F0F0';
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

            if(scene.type === 'thumbnail'){
                // 썸네일 미리보기 - 검은 배경 + 이미지 가로로 가운데 + 텍스트
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

                const thumbUrl = scene.image_url || null;
                let imgBottomY = CANVAS_H * 0.45;
                if(thumbUrl && loadedImages[thumbUrl]){
                    const img = loadedImages[thumbUrl];
                    const userScale = (scene.imageScale || 100) / 100;
                    const offsetY = scene.imageOffsetY || 0;
                    const baseScale = CANVAS_W / img.width;
                    const finalScale = baseScale * userScale;
                    const w = img.width * finalScale;
                    const h = img.height * finalScale;
                    const xPos = (CANVAS_W - w) / 2;
                    const yPos = (CANVAS_H - h) / 2 + offsetY;
                    ctx.drawImage(img, xPos, yPos, w, h);
                    imgBottomY = yPos + h;
                }

                // 제목 텍스트 - 이미지 아래
                const title = scene.title || '제목';
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 42px "Malgun Gothic"';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 4;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;
                wrapText(ctx, title, CANVAS_W/2, Math.max(imgBottomY + 60, CANVAS_H * 0.75), CANVAS_W - 80, 56);
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;

                document.getElementById('previewLabel').textContent = '썸네일';
                return;
            }

            const ld = scene.lines_data || [];
            if(ld.length === 0) return;

            const showUpTo = previewLineIdx >= 0 ? Math.min(previewLineIdx, ld.length-1) : ld.length-1;

            // 장면 이미지
            let textStartY = 60;
            const sceneImgUrl = scene.image_url || null;
            if(sceneImgUrl && loadedImages[sceneImgUrl]){
                const img = loadedImages[sceneImgUrl];
                const userScale = (scene.imageScale || 100) / 100;
                const offsetY = scene.imageOffsetY || 0;
                const maxH = CANVAS_H * 0.35;
                const baseScale = Math.min((CANVAS_W - 80) / img.width, maxH / img.height, 1);
                const finalScale = baseScale * userScale;
                const w = img.width * finalScale, h = img.height * finalScale;
                const yPos = 30 + offsetY;
                ctx.drawImage(img, (CANVAS_W - w)/2, yPos, w, h);
                textStartY = yPos + h + 20;
            }

            let y = textStartY;

            // 남은 공간에 맞게 폰트 크기 자동 조절
            const availableH = CANVAS_H - textStartY - 40;
            const totalLines = ld.filter(l => l.text && l.text.trim()).length;
            const lineImgCount = ld.filter((l,i) => i <= showUpTo && l.image_url && loadedImages[l.image_url]).length;
            const neededH = totalLines * 48 + lineImgCount * (CANVAS_H * 0.22 + 12);
            const scaleFactor = neededH > availableH ? availableH / neededH : 1;

            // === 2-pass 렌더링: 이미지 먼저, 텍스트 나중에 (텍스트가 항상 위) ===

            // Pass 1: 레이아웃 계산 + 이미지 그리기
            let layoutY = textStartY;
            let lineLayouts = [];
            for(let i = 0; i <= showUpTo; i++){
                const line = ld[i];
                const st = line.style || {};
                const fontSize = Math.round((st.fontSize || 32) * scaleFactor);

                let entry = { y: layoutY, fontSize, lineIdx: i, hasText: !!(line.text && line.text.trim()) };

                // 줄 이미지 그리기 (offsetY가 레이아웃에 반영 — 텍스트도 같이 이동)
                if(line.image_url && loadedImages[line.image_url]){
                    const img = loadedImages[line.image_url];
                    const lineImgScale = (line.imageScale || 100) / 100;
                    const lineImgOffsetY = line.imageOffsetY || 0;
                    const maxH = CANVAS_H * 0.22 * scaleFactor;
                    const baseScale = Math.min((CANVAS_W - 100) / img.width, maxH / img.height, 1);
                    const finalScale = baseScale * lineImgScale;
                    const w = img.width * finalScale, h = img.height * finalScale;
                    const imgDrawY = layoutY + lineImgOffsetY;
                    ctx.drawImage(img, (CANVAS_W - w)/2, imgDrawY, w, h);
                    layoutY = imgDrawY + h + 12;
                    entry.afterImgY = layoutY;
                }

                if(line.text && line.text.trim()){
                    entry.textY = layoutY;
                    layoutY += fontSize + Math.round(16 * scaleFactor);
                }

                lineLayouts.push(entry);
            }

            // Pass 2: 텍스트 그리기 (이미지 위에 표시)
            for(let i = 0; i <= showUpTo; i++){
                const line = ld[i];
                const layout = lineLayouts[i];
                if(!line.text || !line.text.trim()) continue;
                if(layout.textY === undefined) continue;

                const st = line.style || {};
                const fontSize = layout.fontSize;
                const color = st.color || '#1A1A1A';
                const align = st.align || 'center';
                const bold = line.text.includes('**');
                const text = line.text.replace(/\*\*/g, '');
                const fontStr = bold ? `bold ${Math.round(fontSize*1.1)}px "Malgun Gothic"` : `${fontSize}px "Malgun Gothic"`;
                ctx.font = fontStr;
                ctx.fillStyle = color;

                const tw = ctx.measureText(text).width;
                let x;
                if(align === 'left') x = 50;
                else if(align === 'right') x = CANVAS_W - tw - 50;
                else x = (CANVAS_W - tw) / 2;

                ctx.textAlign = 'left';
                ctx.fillText(text, x, layout.textY + fontSize);

                // 현재 줄 하이라이트
                if(i === showUpTo && previewLineIdx >= 0){
                    ctx.strokeStyle = '#fe2c55';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x - 4, layout.textY + fontSize - fontSize - 4, tw + 8, fontSize + 8);
                }
            }

            y = layoutY;

            const labels = {hooking:'훅킹+공감',story_emotion:'스토리(감정)',story_struggle:'스토리(좌절)',information:'원인/정보',solution:'솔루션',proof:'증거/후기',tips:'추가팁',closing:'마무리'};
            const lbl = labels[scene.name] || scene.name || '';
            document.getElementById('previewLabel').textContent = `${lbl} (${showUpTo+1}/${ld.length}줄)`;
        }

        function wrapText(ctx, text, x, y, maxW, lineH){
            let words = text.split('');
            let line = '';
            let lines = [];
            for(let ch of words){
                let test = line + ch;
                if(ctx.measureText(test).width > maxW && line){
                    lines.push(line);
                    line = ch;
                } else { line = test; }
            }
            if(line) lines.push(line);
            const startY = y - (lines.length - 1) * lineH / 2;
            lines.forEach((l, i) => {
                ctx.fillText(l, x, startY + i * lineH);
            });
        }

        function selectScene(si){
            activeSceneIdx = si;
            const scene = currentScenes[si];
            if(scene.type === 'thumbnail'){
                previewLineIdx = -1;
            } else {
                const ld = scene.lines_data || [];
                previewLineIdx = ld.length - 1;
            }
            document.getElementById('previewNav').style.display = (scene.type !== 'thumbnail' && (scene.lines_data||[]).length > 0) ? 'flex' : 'none';
            renderScenes();
            renderPreview();
        }

        function previewPrevLine(){
            if(activeSceneIdx < 0) return;
            if(previewLineIdx > 0) previewLineIdx--;
            renderPreview();
        }
        function previewNextLine(){
            if(activeSceneIdx < 0) return;
            const ld = currentScenes[activeSceneIdx].lines_data || [];
            if(previewLineIdx < ld.length - 1) previewLineIdx++;
            renderPreview();
        }

        function preloadImage(url, callback, forceReload=false){
            if(!forceReload && loadedImages[url]){ if(callback) callback(); return; }
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => { loadedImages[url] = img; if(callback) callback(); };
            img.src = url;
        }

        async function generateScript(){
            const topic=document.getElementById('topic').value.trim();
            const desc=document.getElementById('description').value.trim();
            const direction=document.getElementById('direction').value.trim();
            if(!topic){ showToast('주제를 입력해주세요',true); return; }
            document.getElementById('btnGenScript').disabled=true;
            document.getElementById('scriptLoading').classList.add('show');
            document.getElementById('status').textContent='대본 생성 중...';
            try{
                const res=await fetch('/api/generate-script',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic,description:desc,direction})});
                const data=await res.json();
                if(data.error){ showToast(data.error,true); return; }
                currentScenes=data.scenes;
                currentScenes.forEach(s=>{ if(s.type!=='thumbnail') ensureLinesData(s); });
                activeSceneIdx = currentScenes.length > 1 ? 1 : 0;
                const scene = currentScenes[activeSceneIdx];
                previewLineIdx = scene.type !== 'thumbnail' ? (scene.lines_data||[]).length - 1 : -1;
                renderScenes();
                renderPreview();
                document.getElementById('previewNav').style.display = 'flex';
                showToast('대본 생성 완료!');
                document.getElementById('status').textContent='편집 중';
            }catch(e){ showToast('오류: '+e.message,true); }
            finally{ document.getElementById('btnGenScript').disabled=false; document.getElementById('scriptLoading').classList.remove('show'); }
        }

            activeSceneIdx = si;
            renderScenes();
            renderPreview();

            ensureLinesData(currentScenes[si]);

        async function uploadSceneImage(input,si){
            const file=input.files[0]; if(!file) return;
            const fd=new FormData();
            fd.append('file',file);
            fd.append('slot',currentScenes[si].image_slot||'thumbnail');
            fd.append('session_id',sessionId);
            try{
                const r=await fetch('/api/upload-image',{method:'POST',body:fd});
                const d=await r.json();
                if(d.error){ showToast(d.error,true); return; }
                const oldUrl = currentScenes[si].image_url;
                if(oldUrl) delete loadedImages[oldUrl];
                currentScenes[si].image_path=d.path;
                currentScenes[si].image_url=d.url;
                preloadImage(d.url, () => { renderScenes(); renderPreview(); }, true);
                showToast('이미지 업로드 완료');
            }catch(e){ showToast('업로드 실패',true); }
        }

        async function uploadLineImage(input,si,li){
            const file=input.files[0]; if(!file) return;
            const fd=new FormData();
            fd.append('file',file);
            fd.append('slot',`line_${si}_${li}`);
            fd.append('session_id',sessionId);
            try{
                const r=await fetch('/api/upload-image',{method:'POST',body:fd});
                const d=await r.json();
                if(d.error){ showToast(d.error,true); return; }
                const oldUrl = currentScenes[si].lines_data[li].image_url;
                if(oldUrl) delete loadedImages[oldUrl];
                currentScenes[si].lines_data[li].image_path=d.path;
                currentScenes[si].lines_data[li].image_url=d.url;
                preloadImage(d.url, () => { renderScenes(); renderPreview(); }, true);
                showToast('이미지 업로드 완료');
            }catch(e){ showToast('업로드 실패',true); }

        async function generateVideo(){
            document.getElementById('btnGenVideo').style.display='none';
            document.getElementById('videoLoading').classList.add('show');
            document.getElementById('status').textContent='영상 생성 중...';
            try{
                const r=await fetch('/api/generate-video',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({scenes:currentScenes,session_id:sessionId})});
                const d=await r.json();
                if(d.error){ showToast(d.error,true); document.getElementById('btnGenVideo').style.display='block'; return; }
                document.getElementById('previewCanvas').style.display='none';
                document.getElementById('previewPlaceholder').style.display='none';
                const screen = document.getElementById('previewScreen');
                const existingVideo = screen.querySelector('video');
                if(existingVideo) existingVideo.remove();
                const video = document.createElement('video');
                video.src = d.video_url;
                video.controls = true;
                video.autoplay = true;
                video.loop = true;
                screen.appendChild(video);
                document.getElementById('downloadLink').href=d.video_url;
                document.getElementById('resultArea').style.display='block';
                document.getElementById('btnGenVideo').style.display='block';
                showToast('영상 생성 완료!');
                document.getElementById('status').textContent='완료';
            }catch(e){ showToast('생성 실패',true); document.getElementById('btnGenVideo').style.display='block'; }
            finally{ document.getElementById('videoLoading').classList.remove('show'); }
        }

        function switchMode(mode){
            document.querySelectorAll('.mode-tab').forEach((t,i)=>{ t.classList.toggle('active', (mode==='auto'?i===0:i===1)); });
            document.getElementById('modeAuto').classList.toggle('active', mode==='auto');
            document.getElementById('modeSelf').classList.toggle('active', mode==='self');
            if(mode==='self' && currentScenes.length===0){
                document.getElementById('scenesContainer').innerHTML='<div style="text-align:center;color:#555;padding:40px 16px;font-size:12px;">왼쪽에서 장면을 추가해주세요</div>';
            }
        }

        function addSceneSelf(type){
            if(type==='thumbnail'){
                currentScenes.push({type:'thumbnail',title:'제목을 입력하세요',duration:2.5});
            } else if(type==='image_text'){
                currentScenes.push({type:'image_text',name:'custom',image_slot:'hooking',lines_data:[{text:'텍스트를 입력하세요',style:{}}]});
            } else {
                currentScenes.push({type:'text',name:'custom',lines_data:[{text:'텍스트를 입력하세요',style:{}}]});
            }
            activeSceneIdx = currentScenes.length - 1;
            const scene = currentScenes[activeSceneIdx];
            previewLineIdx = scene.type !== 'thumbnail' ? (scene.lines_data||[]).length - 1 : -1;
            renderScenes();
            renderPreview();
            document.getElementById('previewNav').style.display = scene.type !== 'thumbnail' ? 'flex' : 'none';
            showToast('장면 추가됨');
        }

        function removeScene(si){
            currentScenes.splice(si,1);
            if(activeSceneIdx >= currentScenes.length) activeSceneIdx = currentScenes.length - 1;
            if(activeSceneIdx >= 0){
                const scene = currentScenes[activeSceneIdx];
                previewLineIdx = scene.type !== 'thumbnail' ? (scene.lines_data||[]).length - 1 : -1;
            } else { previewLineIdx = -1; }
            renderScenes();
            renderPreview();
        }

        function moveScene(si, dir){
            const newIdx = si + dir;
            if(newIdx < 0 || newIdx >= currentScenes.length) return;
            [currentScenes[si], currentScenes[newIdx]] = [currentScenes[newIdx], currentScenes[si]];
            if(activeSceneIdx === si) activeSceneIdx = newIdx;
            else if(activeSceneIdx === newIdx) activeSceneIdx = si;
            renderScenes();
            renderPreview();
        }

        function resetAll(){
            sessionId=Math.random().toString(36).substr(2,8);
            currentScenes=[]; activeSceneIdx=-1; previewLineIdx=-1; loadedImages={};
            document.getElementById('topic').value='';
            document.getElementById('description').value='';
            document.getElementById('scenesContainer').innerHTML='<div style="text-align:center;color:#555;padding:40px 16px;font-size:12px;">주제를 입력하고 대본을 생성해주세요</div>';
            document.getElementById('previewPlaceholder').style.display='block';
            document.getElementById('previewCanvas').style.display='none';
            const screen = document.getElementById('previewScreen');
            const v = screen.querySelector('video'); if(v) v.remove();
            document.getElementById('previewPlaceholder').textContent='대본 생성 후\n미리보기 표시';
            document.getElementById('btnGenVideo').style.display='none';
            document.getElementById('resultArea').style.display='none';
            document.getElementById('previewNav').style.display='none';
            document.getElementById('previewLabel').textContent='장면을 선택하세요';
            document.getElementById('status').textContent='준비됨';
            updateTotals();
        }
    </script>
</body>
</html>
